name: EmoteSniper Auto Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  update-emotes:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Run EmoteSniper
        run: |
          echo "Starting EmoteSniper update..."
          node run.js
      
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code EmoteSniper.json || echo "changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add EmoteSniper.json
          git commit -m "🤖 Auto update emotes - $(date '+%Y-%m-%d %H:%M:%S UTC')"
          git push
      
      - name: Log completion
        run: |
          if [ -f "EmoteSniper.json" ]; then
            TOTAL_ITEMS=$(jq '.totalItems' EmoteSniper.json)
            LAST_UPDATE=$(jq -r '.lastUpdate' EmoteSniper.json)
            echo "✅ Update completed successfully"
            echo "📊 Total items: $TOTAL_ITEMS"
            echo "🕒 Last update: $LAST_UPDATE"
          else
            echo "⚠️ EmoteSniper.json not found"
          fi
